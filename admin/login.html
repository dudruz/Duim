<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0b0d">
    <meta name="robots" content="noindex, nofollow">
    <title>Entrar no painel | Barbearia du Amigo</title>
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-admin-page="login">
    <main class="admin-login-page">
        <section class="admin-login-visual">
            <div class="admin-login-brand">
                <img src="../assets/images/logo-oficial.png" alt="Logo Corte Dú Amigo">
                <h1>Painel do Duin</h1>
                <p>Agenda, clientes, serviços, produtos e financeiro em um só lugar.</p>
            </div>
        </section>

        <section class="admin-login-panel">
            <div class="admin-login-card">
                <a class="back-link" href="../index.html">Voltar para o site</a>
                <h2>Acesso privado</h2>
                <p>Entre com o e-mail autorizado no Supabase.</p>

                <p class="login-message" data-login-message hidden></p>

                <form class="admin-form" data-login-form novalidate>
                    <div class="form-field">
                        <label for="admin-email">E-mail</label>
                        <input id="admin-email" name="email" type="email" autocomplete="username" required>
                    </div>
                    <div class="form-field">
                        <label for="admin-password">Senha</label>
                        <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <button class="button button--primary" type="submit">Entrar no painel</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/admin-core.js"></script>
    <script src="../js/admin-login.js"></script>
</body>
</html>
