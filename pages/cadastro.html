<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0b0d">
    <meta name="description" content="Crie sua conta na Barbearia du Amigo para agendar e acompanhar seus atendimentos.">
    <title>Criar conta | Barbearia du Amigo</title>
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/customer.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="customer-page" data-customer-auth-page="register">
    <header class="site-header" data-header>
        <div class="container site-header__content">
            <a class="brand" href="../index.html">
                <img class="brand__logo" src="../assets/images/logo-oficial.png" alt="" width="48" height="48">
                <span class="brand__text">Barbearia du Amigo</span>
            </a>
            <a class="button button--small button--secondary" href="login.html">Já tenho conta</a>
        </div>
    </header>

    <main class="customer-auth-main">
        <section class="auth-shell" aria-labelledby="register-title">
            <div class="auth-showcase">
                <div class="auth-showcase__content">
                    <img class="auth-showcase__logo" src="../assets/images/logo-oficial.png" alt="Logo Corte Dú Amigo">
                    <p class="eyebrow">Cadastro rápido</p>
                    <h1>Seu atendimento começa por aqui.</h1>
                    <p>Uma conta única para agendar, cancelar dentro do prazo e consultar seu histórico.</p>
                </div>
            </div>
            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-card__heading">
                        <p class="eyebrow">Primeiro acesso</p>
                        <h2 id="register-title">Criar conta</h2>
                        <p>Preencha seus dados reais para o Duin identificar seu horário.</p>
                    </div>
                    <p class="auth-status" data-auth-status hidden role="status"></p>
                    <form class="auth-form" data-register-form novalidate>
                        <div class="form-field">
                            <label for="register-name">Nome completo</label>
                            <input id="register-name" name="fullName" autocomplete="name" minlength="3" required placeholder="Seu nome completo">
                            <small class="form-error" data-error-for="fullName"></small>
                        </div>
                        <div class="form-field">
                            <label for="register-phone">WhatsApp</label>
                            <input id="register-phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel" required placeholder="(31) 99999-9999">
                            <small class="form-error" data-error-for="phone"></small>
                        </div>
                        <div class="form-field">
                            <label for="register-email">E-mail</label>
                            <input id="register-email" name="email" type="email" inputmode="email" autocomplete="email" required placeholder="voce@exemplo.com">
                            <small class="form-error" data-error-for="email"></small>
                        </div>
                        <div class="form-field">
                            <label for="register-password">Senha</label>
                            <div class="password-field">
                                <input id="register-password" name="password" type="password" autocomplete="new-password" minlength="6" required placeholder="Mínimo de 6 caracteres">
                                <button class="password-toggle" type="button" data-password-toggle>Mostrar</button>
                            </div>
                            <small class="form-error" data-error-for="password"></small>
                        </div>
                        <div class="form-field">
                            <label for="register-confirm">Confirmar senha</label>
                            <div class="password-field">
                                <input id="register-confirm" name="passwordConfirm" type="password" autocomplete="new-password" minlength="6" required placeholder="Repita a senha">
                                <button class="password-toggle" type="button" data-password-toggle>Mostrar</button>
                            </div>
                            <small class="form-error" data-error-for="passwordConfirm"></small>
                        </div>
                        <label class="legal-highlight checkbox-field">
                            <input name="privacy" type="checkbox" required>
                            <span>Li e concordo com a <a class="text-link" href="privacidade.html" target="_blank">Política de Privacidade</a>.</span>
                        </label>
                        <small class="form-error" data-error-for="privacy"></small>
                        <button class="button button--primary" type="submit">Criar minha conta</button>
                    </form>
                    <div class="auth-links">
                        <p>Já é cliente cadastrado?</p>
                        <a class="button button--secondary" href="login.html" data-login-link>Entrar</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/customer-auth.js"></script>
</body>
</html>
