<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0b0d">
    <meta name="robots" content="noindex, nofollow">
    <script>
        (() => {
            const parts = location.pathname.split("/").filter(Boolean);
            const base = location.hostname.endsWith("github.io") && parts.length ? `/${parts[0]}/` : "/";
            document.write(`<base href="${base}">`);
        })();
    </script>
    <title>Página não encontrada | Barbearia du Amigo</title>
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/mobile-v13.css">
</head>
<body class="error-page">
    <header class="site-header error-header">
        <div class="container site-header__content">
            <a class="brand" href="index.html" aria-label="Página inicial da Barbearia du Amigo">
                <img class="brand__logo" src="assets/images/logo-oficial.png" alt="" width="48" height="48">
                <span class="brand__text">Barbearia du Amigo</span>
            </a>
            <a class="button button--small button--primary" href="pages/minha-conta.html?acao=agendar">Agendar</a>
        </div>
    </header>

    <main class="error-main">
        <article class="error-card">
            <div class="error-card__visual" aria-hidden="true">
                <span class="error-code">404</span>
                <img src="assets/images/logo-oficial.png" alt="">
            </div>
            <div class="error-card__copy">
                <p class="eyebrow">Página não encontrada</p>
                <h1>Esse endereço saiu para dar um trato.</h1>
                <p>A página pode ter mudado de lugar, ter sido removida ou o endereço foi digitado incorretamente.</p>
                <div class="error-actions">
                    <a class="button button--primary" href="index.html">Voltar ao início</a>
                    <a class="button button--secondary" href="pages/minha-conta.html?acao=agendar">Agendar horário</a>
                    <a class="text-link" href="pages/minha-conta.html">Abrir minha conta</a>
                </div>
            </div>
        </article>
    </main>

    <footer class="site-footer error-footer">
        <div class="container site-footer__content">
            <p>© <span data-current-year></span> Barbearia du Amigo.</p>
            <div class="site-footer__links"><a href="pages/loja.html">Loja</a><a href="pages/privacidade.html">Privacidade</a><a href="index.html#contato">Contato</a></div>
        </div>
    </footer>

    <script src="js/config.js?v=16"></script>
    <script src="js/utils.js?v=16"></script>
    <script src="js/main.js?v=16"></script>
</body>
</html>
