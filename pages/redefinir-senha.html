<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0b0d">
    <meta name="robots" content="noindex, nofollow">
    <title>Nova senha | Barbearia du Amigo</title>
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/reset.css"><link rel="stylesheet" href="../css/variables.css"><link rel="stylesheet" href="../css/global.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/pages.css"><link rel="stylesheet" href="../css/customer.css"><link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/mobile-v13.css">
</head>
<body class="customer-page" data-customer-auth-page="reset">
    <header class="site-header" data-header><div class="container site-header__content"><a class="brand" href="../index.html"><img class="brand__logo" src="../assets/images/logo-oficial.png" alt="" width="48" height="48"><span class="brand__text">Barbearia du Amigo</span></a></div></header>
    <main class="customer-auth-main">
        <section class="auth-shell" aria-labelledby="reset-title">
            <div class="auth-showcase"><div class="auth-showcase__content"><img class="auth-showcase__logo" src="../assets/images/logo-oficial.png" alt="Logo Corte Dú Amigo"><p class="eyebrow">Nova senha</p><h1>Conta pronta para o próximo corte.</h1></div></div>
            <div class="auth-panel"><div class="auth-card"><div class="auth-card__heading"><p class="eyebrow">Segurança</p><h2 id="reset-title">Definir nova senha</h2><p>Escolha uma senha com pelo menos 6 caracteres.</p></div><p class="auth-status" data-auth-status hidden role="status"></p><form class="auth-form" data-reset-form novalidate><div class="form-field"><label for="new-password">Nova senha</label><div class="password-field"><input id="new-password" name="password" type="password" autocomplete="new-password" minlength="6" required><button class="password-toggle" type="button" data-password-toggle>Mostrar</button></div><small class="form-error" data-error-for="password"></small></div><div class="form-field"><label for="new-password-confirm">Confirmar nova senha</label><div class="password-field"><input id="new-password-confirm" name="passwordConfirm" type="password" autocomplete="new-password" minlength="6" required><button class="password-toggle" type="button" data-password-toggle>Mostrar</button></div><small class="form-error" data-error-for="passwordConfirm"></small></div><button class="button button--primary" type="submit">Salvar nova senha</button></form></div></div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/config.js?v=15"></script><script src="../js/utils.js?v=15"></script><script src="../js/env.js?v=15"></script><script src="../js/supabase-client.js?v=15"></script><script src="../js/api.js?v=15"></script><script src="../js/main.js?v=15"></script><script src="../js/customer-auth.js?v=15"></script>
</body>
</html>
